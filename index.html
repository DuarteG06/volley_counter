<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volleyball Scorekeeper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="setup-screen" class="container">
        <h1>Volleyball Scorekeeper</h1>
        <h2>Select Match Format</h2>
        <div class="setup-buttons">
            <button onclick="startGame(1, 25)">1 Set (to 25)</button>
            <button onclick="startGame(3, 25)">Best of 3 (to 25)</button>
            <button onclick="startGame(5, 25)">Best of 5 (to 25)</button>
            
            <button class="alt-btn" onclick="startGame(1, 15)">1 Set (to 15)</button>
            <button class="alt-btn" onclick="startGame(3, 15)">Best of 3 (to 15)</button>
            <button class="alt-btn" onclick="startGame(5, 15)">Best of 5 (to 15)</button>
        </div>
    </div>

    <div id="scoreboard-screen" class="container hidden">
        <div class="match-info">
            <p>Target: <span id="points-target">25</span> points (Win by 2)<span id="match-format-text"></span></p>
        </div>

        <div class="scoreboard">
            <div class="team-card team-a" onclick="addPoint('A', event)">
                <div class="team-header">
                    <h2 id="name-a" contenteditable="true" oninput="saveData()">Team A</h2>
                    <span id="serve-a" class="serve-icon active">🏐</span>
                </div>
                <div class="sets-won">Sets: <span id="sets-a">0</span></div>
                <div class="score" id="score-a">0</div>
                <button class="undo-btn" onclick="removePoint('A', event)">Undo (-1)</button>
            </div>

            <div class="team-card team-b" onclick="addPoint('B', event)">
                <div class="team-header">
                    <h2 id="name-b" contenteditable="true" oninput="saveData()">Team B</h2>
                    <span id="serve-b" class="serve-icon">🏐</span>
                </div>
                <div class="sets-won">Sets: <span id="sets-b">0</span></div>
                <div class="score" id="score-b">0</div>
                <button class="undo-btn" onclick="removePoint('B', event)">Undo (-1)</button>
            </div>
        </div>

        <div class="controls">
            <button class="nav-btn" onclick="goHome()">🏠 Home</button>
            <button class="action-btn" onclick="swapSides()">🔄 Swap Sides</button>
            <button id="next-set-btn" class="action-btn hidden" onclick="startNextSet()">Next Set ➡️</button>
            <button class="danger-btn" onclick="resetMatch()">Restart Match</button>
        </div>
    </div>

    <div id="custom-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-message">Set Ended!</h2>
            <button onclick="closeModal()">Okay</button>
        </div>
    </div>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="confirm-message" style="font-size: 1.5rem;">Are you sure?</h2>
            <div class="confirm-buttons">
                <button onclick="executeConfirm()" class="danger-btn">Yes</button>
                <button onclick="closeConfirmModal()" class="nav-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
